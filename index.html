<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NMB-HLabSys — Haematology Lab System</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #0a0f1e;
  --bg2: #111827;
  --bg3: #1a2235;
  --surface: #1e2d45;
  --surface2: #243352;
  --border: rgba(99,157,255,0.12);
  --border2: rgba(99,157,255,0.22);
  --accent: #4f8ef7;
  --accent2: #7ab3ff;
  --accent-glow: rgba(79,142,247,0.18);
  --red: #f56565;
  --green: #48bb78;
  --amber: #f6ad55;
  --purple: #9f7aea;
  --teal: #38b2ac;
  --text: #e8edf5;
  --text2: #8fa3c0;
  --text3: #5a7299;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
/* ---- SCROLLBAR ---- */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--surface2);border-radius:3px}

/* ======= LOGIN SCREEN ======= */
#loginScreen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:1000;transition:opacity .5s}
#loginScreen.hidden{opacity:0;pointer-events:none}
.login-bg{position:absolute;inset:0;overflow:hidden}
.login-bg::before{content:'';position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(79,142,247,0.12),transparent 70%);top:-100px;right:-100px;animation:pulse 6s ease-in-out infinite}
.login-bg::after{content:'';position:absolute;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(159,122,234,0.08),transparent 70%);bottom:-50px;left:-50px;animation:pulse 8s ease-in-out infinite reverse}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.1);opacity:0.7}}
.login-card{position:relative;z-index:1;background:var(--bg2);border:1px solid var(--border2);border-radius:20px;padding:48px;width:420px;box-shadow:0 20px 60px rgba(0,0,0,0.5)}
.login-logo{text-align:center;margin-bottom:32px}
.login-logo h1{font-family:'Fraunces',serif;font-size:28px;font-weight:600;color:var(--text);letter-spacing:-0.5px}
.login-logo span{color:var(--accent)}
.login-logo p{font-size:12px;color:var(--text3);margin-top:4px;font-family:'DM Mono',monospace;letter-spacing:1px;text-transform:uppercase}
.login-tabs{display:flex;gap:6px;background:var(--bg3);border-radius:var(--radius-sm);padding:4px;margin-bottom:28px}
.login-tab{flex:1;padding:8px;border:none;background:none;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:12px;border-radius:6px;cursor:pointer;transition:all .2s;font-weight:500}
.login-tab.active{background:var(--surface);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,0.3)}
.form-group{margin-bottom:18px}
.form-group label{display:block;font-size:12px;color:var(--text2);margin-bottom:6px;font-weight:500;letter-spacing:0.3px}
.form-group input,.form-group select{width:100%;padding:11px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color .2s}
.form-group input:focus,.form-group select:focus{border-color:var(--accent)}
.form-group select option{background:var(--bg2)}
.btn-primary{width:100%;padding:13px;background:var(--accent);border:none;border-radius:var(--radius-sm);color:#fff;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;letter-spacing:0.2px}
.btn-primary:hover{background:var(--accent2);transform:translateY(-1px);box-shadow:0 6px 20px rgba(79,142,247,0.35)}
.demo-hint{margin-top:20px;padding:14px;background:var(--bg3);border-radius:var(--radius-sm);border:1px solid var(--border)}
.demo-hint p{font-size:11px;color:var(--text3);line-height:1.7;font-family:'DM Mono',monospace}
.demo-hint strong{color:var(--accent2)}

/* ======= MAIN APP ======= */
#app{display:none;height:100vh;overflow:hidden}
#app.visible{display:flex}

/* SIDEBAR */
.sidebar{width:240px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-header{padding:20px 20px 16px;border-bottom:1px solid var(--border)}
.sidebar-header h2{font-family:'Fraunces',serif;font-size:18px;font-weight:600;color:var(--text)}
.sidebar-header h2 span{color:var(--accent)}
.sidebar-user{display:flex;align-items:center;gap:10px;padding:16px 20px;border-bottom:1px solid var(--border);background:var(--bg3)}
.user-avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--purple));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:#fff;flex-shrink:0}
.user-info p{font-size:13px;font-weight:500;color:var(--text)}
.user-info span{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace}
.sidebar-nav{flex:1;overflow-y:auto;padding:12px 10px}
.nav-section{margin-bottom:8px}
.nav-section-label{font-size:10px;color:var(--text3);font-weight:600;letter-spacing:1.2px;text-transform:uppercase;padding:6px 10px 4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--radius-sm);cursor:pointer;transition:all .2s;color:var(--text2);font-size:13px;font-weight:500;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:var(--accent-glow);color:var(--accent2);border:1px solid rgba(79,142,247,0.2)}
.nav-item .icon{font-size:15px;width:18px;text-align:center}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;padding:2px 6px;border-radius:10px;font-weight:600}
.nav-badge.green{background:var(--green)}
.nav-badge.amber{background:var(--amber);color:#1a1a1a}
.sidebar-footer{padding:14px 20px;border-top:1px solid var(--border)}
.btn-logout{width:100%;padding:9px;background:transparent;border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text2);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:all .2s}
.btn-logout:hover{background:rgba(245,101,101,0.1);border-color:var(--red);color:var(--red)}

/* MAIN CONTENT */
.main{flex:1;overflow:hidden;display:flex;flex-direction:column}
.topbar{padding:16px 28px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar h3{font-size:18px;font-weight:600;color:var(--text)}
.topbar-actions{display:flex;gap:10px;align-items:center}
.content{flex:1;overflow-y:auto;padding:28px}

/* PANELS */
.panel{display:none;animation:fadeIn .3s ease}
.panel.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* CARDS & STATS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:28px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px;position:relative;overflow:hidden}
.stat-card::after{content:'';position:absolute;top:0;right:0;width:80px;height:80px;border-radius:50%;opacity:0.06;background:var(--accent);transform:translate(20px,-20px)}
.stat-card.red::after{background:var(--red)}
.stat-card.green::after{background:var(--green)}
.stat-card.amber::after{background:var(--amber)}
.stat-card.purple::after{background:var(--purple)}
.stat-card .icon{font-size:22px;margin-bottom:10px}
.stat-card .value{font-size:28px;font-weight:600;color:var(--text);font-family:'Fraunces',serif}
.stat-card .label{font-size:12px;color:var(--text2);margin-top:4px}
.stat-card .trend{font-size:11px;color:var(--green);margin-top:6px}
.stat-card.red .trend{color:var(--red)}

/* TABLES */
.table-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:20px}
.table-header{padding:16px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.table-header h4{font-size:14px;font-weight:600}
.table-search{padding:7px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;width:200px}
.table-search:focus{border-color:var(--accent)}
table{width:100%;border-collapse:collapse}
th{padding:11px 20px;text-align:left;font-size:11px;font-weight:600;color:var(--text3);letter-spacing:0.8px;text-transform:uppercase;background:var(--bg3);border-bottom:1px solid var(--border)}
td{padding:13px 20px;font-size:13px;color:var(--text2);border-bottom:1px solid var(--border)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg3);color:var(--text)}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:0.3px}
.badge.submitted{background:rgba(79,142,247,0.15);color:var(--accent2)}
.badge.progress{background:rgba(246,173,85,0.15);color:var(--amber)}
.badge.completed{background:rgba(72,187,120,0.15);color:var(--green)}
.badge.verified{background:rgba(159,122,234,0.15);color:var(--purple)}
.badge.urgent{background:rgba(245,101,101,0.2);color:var(--red)}
.badge.routine{background:rgba(56,178,172,0.15);color:var(--teal)}
.badge.released{background:rgba(72,187,120,0.2);color:var(--green)}
.badge.cancelled{background:rgba(245,101,101,0.1);color:var(--red)}
.badge.low{background:rgba(245,101,101,0.2);color:var(--red)}
.badge.normal{background:rgba(72,187,120,0.15);color:var(--green)}

/* BUTTONS */
.btn{padding:8px 16px;border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;border:none}
.btn-accent{background:var(--accent);color:#fff}
.btn-accent:hover{background:var(--accent2);transform:translateY(-1px)}
.btn-outline{background:transparent;border:1px solid var(--border2);color:var(--text2)}
.btn-outline:hover{border-color:var(--accent);color:var(--accent2)}
.btn-danger{background:rgba(245,101,101,0.15);color:var(--red);border:1px solid rgba(245,101,101,0.3)}
.btn-danger:hover{background:rgba(245,101,101,0.25)}
.btn-success{background:rgba(72,187,120,0.15);color:var(--green);border:1px solid rgba(72,187,120,0.3)}
.btn-success:hover{background:rgba(72,187,120,0.25)}
.btn-sm{padding:5px 11px;font-size:12px}

/* FORM LAYOUTS */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.form-grid.three{grid-template-columns:1fr 1fr 1fr}
.form-full{grid-column:1/-1}
.form-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:20px}
.form-card h4{font-size:14px;font-weight:600;margin-bottom:18px;padding-bottom:12px;border-bottom:1px solid var(--border);color:var(--text)}
.form-row{display:flex;gap:12px;align-items:flex-end}
.fg{display:flex;flex-direction:column;gap:6px;flex:1}
.fg label{font-size:12px;color:var(--text2);font-weight:500}
.fg input,.fg select,.fg textarea{padding:10px 13px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;transition:border-color .2s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--accent)}
.fg select option{background:var(--bg2)}
.fg textarea{resize:vertical;min-height:80px}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:500;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s;backdrop-filter:blur(4px)}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:32px;width:90%;max-width:560px;max-height:85vh;overflow-y:auto;transform:translateY(20px);transition:transform .25s;box-shadow:0 20px 60px rgba(0,0,0,0.6)}
.modal-overlay.open .modal{transform:translateY(0)}
.modal h3{font-size:17px;font-weight:600;margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}

/* ALERT BANNER */
.alert{padding:12px 16px;border-radius:var(--radius-sm);margin-bottom:16px;font-size:13px;display:flex;align-items:center;gap:10px}
.alert.info{background:rgba(79,142,247,0.1);border:1px solid rgba(79,142,247,0.2);color:var(--accent2)}
.alert.warning{background:rgba(246,173,85,0.1);border:1px solid rgba(246,173,85,0.2);color:var(--amber)}
.alert.success{background:rgba(72,187,120,0.1);border:1px solid rgba(72,187,120,0.2);color:var(--green)}
.alert.danger{background:rgba(245,101,101,0.1);border:1px solid rgba(245,101,101,0.2);color:var(--red)}

/* DASHBOARD CHART PLACEHOLDER */
.chart-placeholder{background:var(--bg3);border-radius:var(--radius-sm);height:180px;display:flex;align-items:flex-end;justify-content:space-around;padding:20px 20px 0;gap:8px;overflow:hidden}
.bar{border-radius:4px 4px 0 0;min-width:28px;position:relative;transition:height .8s cubic-bezier(.34,1.56,.64,1)}
.bar-label{position:absolute;bottom:-20px;left:50%;transform:translateX(-50%);font-size:10px;color:var(--text3);white-space:nowrap}

/* PROGRESS TIMELINE */
.timeline{display:flex;flex-direction:column;gap:0}
.timeline-step{display:flex;gap:16px;position:relative}
.timeline-step:not(:last-child)::before{content:'';position:absolute;left:14px;top:30px;bottom:0;width:2px;background:var(--border)}
.tl-dot{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;z-index:1}
.tl-dot.done{background:rgba(72,187,120,0.2);border:2px solid var(--green)}
.tl-dot.active{background:rgba(79,142,247,0.2);border:2px solid var(--accent);animation:ringPulse 2s infinite}
.tl-dot.pending{background:var(--bg3);border:2px solid var(--border)}
@keyframes ringPulse{0%,100%{box-shadow:0 0 0 0 rgba(79,142,247,0.3)}50%{box-shadow:0 0 0 6px rgba(79,142,247,0)}}
.tl-content{flex:1;padding-bottom:20px}
.tl-content p{font-size:13px;font-weight:500;color:var(--text)}
.tl-content span{font-size:11px;color:var(--text3)}

/* RESULT CARD */
.result-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px;margin-bottom:10px}
.result-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)}
.result-row:last-child{border-bottom:none}
.result-name{font-size:13px;color:var(--text);font-weight:500}
.result-value{font-size:14px;font-weight:600;font-family:'DM Mono',monospace}
.result-range{font-size:11px;color:var(--text3)}
.abnormal{color:var(--red)}
.normal-val{color:var(--green)}

/* DASHBOARD WORKLOAD */
.workload-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.workload-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px;display:flex;align-items:center;gap:14px}
.workload-icon{width:40px;height:40px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.wc-blue{background:rgba(79,142,247,0.15)}
.wc-amber{background:rgba(246,173,85,0.15)}
.wc-red{background:rgba(245,101,101,0.15)}
.wc-green{background:rgba(72,187,120,0.15)}
.wc-purple{background:rgba(159,122,234,0.15)}
.workload-card .num{font-size:24px;font-weight:600;font-family:'Fraunces',serif}
.workload-card .lbl{font-size:12px;color:var(--text2)}

/* GRAPH PLACEHOLDER */
.graph-area{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:20px;margin-bottom:16px}
.graph-area h5{font-size:13px;font-weight:600;margin-bottom:14px}
.sparkline{display:flex;align-items:flex-end;gap:4px;height:80px}
.spark-bar{flex:1;border-radius:2px 2px 0 0;background:linear-gradient(to top,var(--accent),var(--purple));opacity:0.7;min-width:12px;transition:height 1s}

/* CONSENT TABLE */
.consent-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border)}
.consent-row:last-child{border-bottom:none}
.toggle-switch{position:relative;width:36px;height:20px}
.toggle-switch input{opacity:0;width:0;height:0}
.slider-toggle{position:absolute;inset:0;background:var(--surface2);border-radius:10px;cursor:pointer;transition:.3s}
.slider-toggle::before{content:'';position:absolute;width:14px;height:14px;left:3px;bottom:3px;background:var(--text2);border-radius:50%;transition:.3s}
.toggle-switch input:checked+.slider-toggle{background:var(--accent)}
.toggle-switch input:checked+.slider-toggle::before{transform:translateX(16px);background:#fff}

/* STOCK LEVEL BAR */
.stock-bar{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;margin-top:4px}
.stock-fill{height:100%;border-radius:3px;transition:width .8s}
.stock-fill.high{background:var(--green)}
.stock-fill.med{background:var(--amber)}
.stock-fill.low{background:var(--red)}

/* NOTIFICATION DOT */
.notif-dot{width:8px;height:8px;background:var(--red);border-radius:50%;display:inline-block;margin-left:4px;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}

/* SECTION TITLE */
.section-title{font-size:22px;font-weight:600;font-family:'Fraunces',serif;margin-bottom:4px}
.section-sub{font-size:13px;color:var(--text2);margin-bottom:24px}

/* EMPTY STATE */
.empty{text-align:center;padding:48px 20px;color:var(--text3)}
.empty .emoji{font-size:36px;margin-bottom:12px}
.empty p{font-size:14px}

/* ROLE SWITCHER in topbar */
.role-pill{padding:5px 12px;background:var(--bg3);border:1px solid var(--border2);border-radius:20px;font-size:12px;color:var(--accent2);font-weight:600;font-family:'DM Mono',monospace}

/* PASSWORD MASK BUTTON */
.pw-wrap{position:relative}
.pw-wrap input{padding-right:40px}
.pw-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text3);font-size:16px}

/* TABS inside panel */
.panel-tabs{display:flex;gap:4px;background:var(--bg3);border-radius:var(--radius-sm);padding:4px;margin-bottom:20px;width:fit-content}
.panel-tab{padding:7px 16px;border:none;background:none;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:13px;border-radius:6px;cursor:pointer;font-weight:500;transition:all .2s}
.panel-tab.active{background:var(--surface);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,0.3)}

/* Overdue flag */
.overdue{color:var(--red);font-weight:600;font-size:11px}

/* REPORT PREVIEW */
.report-preview{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:20px;margin-top:16px}
.report-preview h5{font-size:13px;color:var(--text3);margin-bottom:10px;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:0.8px}

/* CONSENT PATIENT CARD */
.patient-consent-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
</style>
</head>
<body>

<!-- ============ LOGIN ============ -->
<div id="loginScreen">
  <div class="login-bg"></div>
  <div class="login-card">
    <div class="login-logo">
      <h1>NMB-<span>HLab</span>Sys</h1>
      <p>Nelson Mandela Bay · Haematology Laboratory</p>
    </div>
    <div class="login-tabs" id="loginTabs">
      <button class="login-tab active" onclick="setRole('manager',this)">Manager</button>
      <button class="login-tab" onclick="setRole('doctor',this)">Doctor</button>
      <button class="login-tab" onclick="setRole('technician',this)">Tech</button>
      <button class="login-tab" onclick="setRole('patient',this)">Patient</button>
      <button class="login-tab" onclick="setRole('admin',this)">Admin</button>
    </div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="loginEmail" value="manager@nmbhlab.co.za" placeholder="your@email.com"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <div class="pw-wrap">
        <input type="password" id="loginPw" value="Lab@2025!" placeholder="••••••••"/>

function buildSidebar(){
  const nav = document.getElementById('sidebarNav');

    sec.items.forEach(item=>{
      const btn=document.createElement('button');
      btn.className='nav-item';btn.id='nav-'+item.id;
      btn.onclick=()=>navigateTo(item.id);
      let badge='';
      if(item.badge) badge=`<span class="nav-badge ${item.badgeColor||''}">${item.badge}</span>`;

  });

function buildBarChart(){

  const max=Math.max(...data.map(d=>d.v));
  el.innerHTML=data.map(d=>`<div style="display:flex;flex-direction:column;align-items:center;gap:4px;flex:1">

}

// ==================== UTILITIES ====================
function switchTab(btn, showId, hideId){
  document.getElementById(showId).style.display='block';
  document.getElementById(hideId).style.display='none';
  btn.parentElement.querySelectorAll('.panel-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
}
function filterTable(input, tableId){
  const q=input.value.toLowerCase();
  document.getElementById(tableId)?.querySelectorAll('tbody tr').forEach(r=>{
    r.style.display=r.textContent.toLowerCase().includes(q)?'':'none';
  });
}
function checkAbnormal(input, min, max){
  const v=parseFloat(input.value);
  const abn=v<min||v>max;
  input.style.borderColor=abn?'var(--red)':'var(--border)';
  input.style.color=abn?'var(--red)':'var(--text)';
}

// ==================== TOAST ====================
function showToast(msg){
  const t=document.createElement('div');
  t.style.cssText='position:fixed;bottom:28px;right:28px;background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:14px 20px;font-size:13px;color:var(--text);z-index:9999;box-shadow:0 8px 32px rgba(0,0,0,0.4);max-width:340px;line-height:1.5;animation:slideUp .3s ease';
  t.textContent=msg;
  const style=document.createElement('style');
  style.textContent='@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}';
  document.head.appendChild(style);
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),3500);
}
</script>
